spring:
  application:
    name: api-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 110.40.135.216:8848
        username: nacos
        password: nacos
    gateway:
      routes:
        # -------------------------- auth 服务路由（修复后）--------------------------
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            # 正确语法：/auth/** 表示“以 /auth 开头，后面跟任意路径”
            # 可匹配：/auth/api/v1/login、/app/auth/api/v1/register（只要包含 /auth/ 且在路径中间/末尾）
            - Path=/auth/**
          filters:
            # 剔除 /auth 这1级前缀：/auth/api/v1/login → /api/v1/login（后端接收路径）
            - RewritePath=^/auth/(.*)$, /$1

        # -------------------------- config 服务路由（同理修复）--------------------------
        - id: config-service-route
          uri: lb://config-service
          predicates:
            - Path=/config/**
          filters:
            - RewritePath=^/config/(.*)$, /$1

        # -------------------------- job 服务路由（同理修复）--------------------------
        - id: job-service-route
          uri: lb://job-service
          predicates:
            - Path=/job/**
          filters:
            - RewritePath=^/job/(.*)$, /$1

        # -------------------------- mq 服务路由（同理修复）--------------------------
        - id: mq-service-route
          uri: lb://mq-service
          predicates:
            - Path=/mq/**
          filters:
            - RewritePath=^/mq/(.*)$, /$1

server:
  port: 9000

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,routes # 暴露健康检查端点
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true # 启用Nacos需要的健康探测端点
